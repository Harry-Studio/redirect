<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>加载中...</title>
</head>
<body>

<script>
  const path = window.location.pathname;   // / 或 /abc
  const params = window.location.search;   // ?uid=123 或 空

  let target = "";

  // 👉 情况1：访问根域名（/）
  if (path === "/" || path === "") {
    // 有参数 → 带参数跳 harry
    if (params) {
      target = "http://ihogu.cn/harry" + params;
    } else {
      // 无参数 → 直接去 harry目录
      target = "http://ihogu.cn/harry";
    }
  } 
  // 👉 情况2：访问子路径（/xxx）
  else {
    target = "http://ihogu.cn" + path + params;
  }

  // 跳转
  window.location.href = target;
</script>

</body>
</html>
